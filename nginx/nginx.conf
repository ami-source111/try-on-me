# ── Try on Me — nginx config ──────────────────────────────────────────────────
# Замени YOUR_DOMAIN на свой домен или IP-адрес сервера.
# SSL-сертификат: раскомментируй секцию HTTPS и получи серт через certbot:
#   certbot certonly --standalone -d YOUR_DOMAIN
#   Положи fullchain.pem и privkey.pem в ./nginx/certs/

server {
    listen 80;
    server_name YOUR_DOMAIN;

    # Перенаправить на HTTPS (раскомментировать после настройки SSL)
    # return 301 https://$host$request_uri;

    # ── Медиафайлы — nginx отдаёт напрямую, без FastAPI ──────────────────────
    location /media/ {
        alias /app/media/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "*";
    }

    # ── API — проксируем на FastAPI ───────────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:8765;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Таймаут увеличен — AI-пайплайн может работать до 90 сек
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}

