# Try on Me — nginx config
# Замени YOUR_DOMAIN на свой домен или IP.
# После получения SSL-сертификата раскомментируй HTTPS-секцию.

server {
    listen 80;
    server_name YOUR_DOMAIN;

    # Медиафайлы (фото, видео) — отдаём напрямую без FastAPI
    location /media/ {
        alias /var/lib/docker/volumes/try-on-me-new_media_data/_data/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "*";
    }

    # API → FastAPI (порт 8765)
    location / {
        proxy_pass         http://127.0.0.1:8765;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
